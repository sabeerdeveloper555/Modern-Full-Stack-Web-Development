<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table CSS Styling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Doctor Visit Appointment</h1>

                <th>Patient</th>
                <th>Date</th>
                <th>Time</th>
                <th>Doctor</th>
                <th>Reason for Visit</th>

        <tbody>
            <tr>
                <td>John</td>
                <td>2023-10-15</td>
                <td>10:00 AM</td>
                <td>Dr. Smith</td>
                <td>Follow Up</td>
            </tr>
            <tr>
                <td>David</td>
                <td>2023-10-16</td>
                <td>2:00 PM</td>
                <td>Dr. Smith</td>
                <td>Follow Up</td>
            </tr>
            <tr>
                <td>Michael</td>
                <td>2023-10-16</td>
                <td>2:00 PM</td>
                <td>Dr. Smith</td>
                <td>Checkup</td>
            </tr>
        </tbody>
    </table>

    <footer>
        <p>&copy; 2025 Doctor Visit Appointment</p>
    </footer>
</body>
</html>
