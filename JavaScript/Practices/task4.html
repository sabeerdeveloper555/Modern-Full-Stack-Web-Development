    <script>
        // Practice Exercise:

        // 1. Declare two variables and swap their values using a third variable and print the result.

        let a = 5;
        let b = 10;

        // Using third vriable to swap values
        // let temp = a; // temp = 5
        // a = b; // a = 10
        // b = temp; // b= 5
        // console.log("After swapping: a =", a, "b =", b);

        // Without using third variable to swap values
        a = a + b; // a= 15
        b = a - b; // 15 - 10 // b = 5
        a = a - b; // 15 - 5 // a = 10
        console.log("After swapping: a =", a, "b =", b);
    </script>
