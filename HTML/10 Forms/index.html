<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 20px;
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #414141;
            color: #fff;
        }

        button{
            background-color: #fff;
            color: #414141;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background-color: #414141;
            color: #fff;
            border: 1px solid #fff;
        }

        inout[type="text"], input[type="email"], input[type="password"], input[type="date"], select, input[type="file"]{
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 300px;
        }

        input[type="reset"]{
            background-color: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Forms in HTML</h1>
    <form action="url" method="GET" accept-charset="utf-8" autocomplete="off" enctype="">
        <label for="fname">First Name:</label>
        <input type="text" id="fname" placeholder="Enter your first name" name="fname"><br><br>
        
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" placeholder="Enter your last name" name="lname"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" name="password"><br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date"><br><br>

        <label for="date-local-time">Date and Time:</label>
        <input type="datetime-local" id="date-local-time" name="date-local-time"><br><br>

        <label for="editors">Editor:</label>
        <select name="editors" id="editors">
            <option value="vscode">VS Code</option>
            <option value="sublime">Sublime Text</option>
            <option value="atom">Atom</option>
        </select><br><br>

        <label for="gender">Gender</label>
        <input type="radio" name="gender" id="male" value="male"> Male
        <input type="radio" name="gender" id="female" value="female"> Female <br><br>

        <label for="files">Files</label>
        <input type="file" id="files" name="files"><br><br>

        <input type="reset" value="Reset">
        <button type="submit">Submit</button>

    </form>
</body>
</html>
